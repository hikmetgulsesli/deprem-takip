<body class="bg-surface text-on-surface overflow-hidden h-screen w-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-6 py-4 bg-[#0c1324] w-full">
<div class="flex items-center gap-3">
<h1 class="text-2xl font-black text-[#adc6ff] uppercase tracking-tighter">deprem-takip</h1>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full surface-container hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">search</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-[#151b2d] hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[#adc6ff]">settings</span>
</button>
</div>
</header>
<!-- Map Canvas (The "Digital Observatory" View) -->
<main class="flex-grow relative mt-16">
<div class="absolute inset-0 bg-surface-container-lowest overflow-hidden">

<!-- Seismic Hotspots (Magnitude Markers) -->
<!-- Large Event (Kandilli - Secondary) -->
<div class="absolute top-1/2 left-1/3 -translate-x-1/2 -translate-y-1/2 group">
<div class="relative flex items-center justify-center">
<div class="absolute w-24 h-24 bg-secondary/20 rounded-full animate-ping"></div>
<div class="relative w-14 h-14 bg-secondary rounded-full flex items-center justify-center border-2 border-surface-bright shadow-2xl">
<span class="magnitude text-on-secondary font-bold text-xl">5.2</span>
</div>
</div>
<div class="mt-2 glass-panel px-3 py-1 rounded-full text-xs font-bold text-secondary uppercase tracking-widest text-center">İZMİR</div>
</div>
<!-- Small Event (USGS - Primary) -->
<div class="absolute top-1/3 right-1/4 group">
<div class="w-8 h-8 rounded-full border-2 border-primary flex items-center justify-center bg-primary/10">
<span class="magnitude text-primary font-bold text-xs">2.8</span>
</div>
<div class="mt-1 opacity-60 text-[10px] font-medium text-primary uppercase tracking-tighter text-center">ELAZIĞ</div>
</div>
<!-- Floating Filter Action Button (FAB) -->
<button class="absolute bottom-32 right-6 z-40 bg-secondary-container text-on-secondary-container px-6 py-4 rounded-full flex items-center gap-3 shadow-2xl active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">filter_list</span>
<span class="font-bold tracking-wider text-sm uppercase">FİLTRELE</span>
</button>
</div>
</main>
<!-- Bottom Sheet: Son Aktiviteler -->

<!-- Handle -->
<div class="w-12 h-1.5 bg-outline/30 rounded-full mx-auto mb-6"></div>
<div class="flex justify-between items-end mb-6">
<div>
<h2 class="text-xl font-bold text-on-surface tracking-tight uppercase">Son Aktiviteler</h2>
<p class="text-[10px] text-outline tracking-widest uppercase">Canlı Sismik Akış</p>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-error animate-pulse"></span>
<span class="text-[10px] font-bold text-error uppercase tracking-widest">Canlı</span>
</div>
</div>

<div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
<!-- Card 1 (Local/Secondary) -->
<div class="min-w-[280px] bg-surface-container rounded-xl p-5 flex flex-col justify-between h-40">

<div>

<span class="magnitude text-4xl font-bold text-secondary">4.1</span>
</div>
<div class="flex justify-between items-center text-[10px] text-outline-variant font-medium tracking-tighter">
<span class="uppercase">Derinlik: 7.2 KM</span>
<span class="uppercase">Hissedilen: 3.8</span>
</div>
</div>
<!-- Card 2 (Global/Primary) -->

<div class="flex justify-between items-start">
<div>
<p class="text-[10px] text-primary font-bold uppercase tracking-widest mb-1">USGS • 03:55</p>
<h3 class="text-xl font-bold text-on-surface uppercase">AKDENİZ</h3>
</div>
<span class="magnitude text-4xl font-bold text-primary">3.4</span>
</div>
<div class="flex justify-between items-center text-[10px] text-outline-variant font-medium tracking-tighter">
<span class="uppercase">Derinlik: 12.0 KM</span>
<span class="uppercase">Hissedilen: 2.1</span>
</div>
</div>
<!-- Card 3 (Local/Secondary) -->
<div class="min-w-[280px] bg-surface-container rounded-xl p-5 flex flex-col justify-between h-40">
<div class="flex justify-between items-start">
<div>
<p class="text-[10px] text-secondary font-bold uppercase tracking-widest mb-1">Kandilli • 03:22</p>
<h3 class="text-xl font-bold text-on-surface uppercase">BALIKESİR</h3>
</div>
<span class="magnitude text-4xl font-bold text-secondary">2.9</span>
</div>
<div class="flex justify-between items-center text-[10px] text-outline-variant font-medium tracking-tighter">
<span class="uppercase">Derinlik: 5.4 KM</span>
<span class="uppercase">Hissedilen: —</span>
</div>
</div>
</div>
</section>

<span class="text-[9px] font-bold uppercase tracking-widest">Harita</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant opacity-60">

</button>

<span class="text-[9px] font-bold uppercase tracking-widest">Analiz</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant opacity-60">
